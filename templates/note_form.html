<!DOCTYPE html>
<html>
<head>
  <title>{% if form.instance.pk %}Edit{% else %}New{% endif %} Note</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
    * {
      margin: 0; padding: 0; box-sizing: border-box;
    }

    /* Body and Background */
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: #e0f7ff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Main Title */
    h2 {
      color: #00eaff;
      text-align: center;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(0, 234, 255, 0.6);
    }

    /* Form Container */
    .container {
      display: flex;
      flex-direction: column;
      gap: 25px;
      width: 100%;
      max-width: 600px;
      text-align: center;
      padding: 30px;
      background-color: #1d263b;
      border-radius: 15px;
      box-shadow: 0 0 30px rgba(0, 234, 255, 0.3);
    }

    /* Form Fields */
    .form-group {
      width: 100%;
      margin-bottom: 25px;
      position: relative;
    }

    /* Title Input Field */
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 15px 20px;
      margin-top: 8px;
      border-radius: 10px;
      border: 2px solid #1d263b;
      background-color: #1d263b;
      color: #fff;
      font-size: 1.1em;
      outline: none;
      transition: all 0.3s ease;
    }

    /* Stronger, Defined Borders */
    .form-group input,
    .form-group textarea {
      border: 2px solid #444; /* Dark border for definition */
    }

    /* Focused State with Glowing Effect */
    .form-group input:focus,
    .form-group textarea:focus {
      border: 2px solid #00eaff; /* Glow effect for border */
      box-shadow: 0 0 15px #00eaff; /* Stronger glow effect */
      background-color: #1b2a38; /* Slight background change for focus */
    }

    /* Title and Content Placeholder Styling */
    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: #a0b0c0;
      font-style: italic;
      font-weight: 400;
    }

    .form-group input:focus::placeholder,
    .form-group textarea:focus::placeholder {
      color: #00eaff; /* Placeholder color change on focus */
    }

    /* Label Styling */
    .form-group label {
      color: #fff;
      font-weight: 600;
      font-size: 1.1em;
      position: absolute;
      top: -15px;
      left: 20px;
      background-color: #1d263b;
      padding: 0 10px;
      transition: all 0.3s ease;
      transform: translateY(0);
    }

    /* Button Container */
    .button-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      width: 100%;
    }

    /* Save Button */
    button {
      padding: 12px 25px;
      background: linear-gradient(90deg, #00eaff, #007fff);
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 30px;
      box-shadow: 0 0 15px rgba(0, 234, 255, 0.4);
      transition: all 0.3s ease;
      cursor: pointer;
      font-size: 1.1em;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(0, 234, 255, 0.6);
    }

    /* Back Link */
    a {
      color: #00eaff;
      font-weight: bold;
      text-decoration: none;
      font-size: 1.1em;
      transition: all 0.3s ease;
    }

    a:hover {
      text-shadow: 0 0 10px #00eaff;
    }

    /* Media Queries for Responsiveness */
    @media (max-width: 768px) {
      .container {
        padding: 15px;
      }
      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <h2>{% if form.instance.pk %}Edit{% else %}New{% endif %} Note</h2>

  <div class="container">
    <!-- Actual Form -->
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_title">Title</label>
        {{ form.title }}
      </div>
      <div class="form-group">
        <label for="id_content">Content</label>
        {{ form.content }}
      </div>

      <div class="button-container">
        <button type="submit">Save</button>
        <a href="{% url 'notes_list' %}">← Back</a>
      </div>
    </form>
  </div>
</body>
</html>
