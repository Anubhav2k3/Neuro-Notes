<!DOCTYPE html>
<html>
<head>
  <title>Delete Note - {{ note.title }}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    /* Body and Background */
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: #e0f7ff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    /* Main Title */
    h2 {
      color: #ff3d67;
      text-align: center;
      margin-bottom: 20px;
      text-shadow: 0 0 10px rgba(255, 61, 103, 0.6);
    }
    
    /* Confirmation Text */
    p {
      font-size: 1.1em;
      margin-bottom: 20px;
      text-align: center;
    }
    
    /* Content Container */
    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 600px;
      text-align: center;
    }
    
    /* Buttons Container */
    .button-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      width: 100%;
    }
    
    /* Buttons Styling */
    button {
      padding: 12px 25px;
      background: linear-gradient(90deg, #ff3d67, #ff5f6d);
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 30px;
      box-shadow: 0 0 15px rgba(255, 61, 103, 0.4);
      transition: all 0.3s ease;
      cursor: pointer;
      font-size: 1.1em;
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255, 61, 103, 0.6);
    }
    
    /* Link Styling */
    a {
      color: #00eaff;
      font-weight: bold;
      text-decoration: none;
      font-size: 1.1em;
      transition: all 0.3s ease;
    }
    a:hover {
      text-shadow: 0 0 10px #00eaff;
    }

    /* Media Queries for Responsiveness */
    @media (max-width: 768px) {
      .container {
        padding: 10px;
      }
      button {
        width: 100%;
      }
    }

  </style>
</head>
<body>
  <h2>Delete Note</h2>
  <p>Are you sure you want to delete: <strong>{{ note.title }}</strong>?</p>

  <div class="container">
    <!-- CSRF Token Included in the Form -->
    <form method="post">
      {% csrf_token %}
      
      <!-- Buttons Container -->
      <div class="button-container">
        <button type="submit">Yes, delete</button>
        <a href="{% url 'notes_list' %}">Cancel</a>
      </div>
    </form>
  </div>
</body>
</html>
