<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
    * {margin: 0; padding: 0; box-sizing: border-box;}
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #141e30, #243b55);
      color: #e0f7ff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: rgba(21, 26, 48, 0.9);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0, 234, 255, 0.15);
      width: 90%;
      max-width: 400px;
      animation: fadeIn 1s ease;
    }
    .login-box h2 {
      color: #00eaff;
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 0 0 10px rgba(0, 234, 255, 0.6);
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      background-color: #1d263b;
      color: #fff;
      font-size: 1em;
      outline: none;
      transition: all 0.3s ease;
    }
    input:focus {
      box-shadow: 0 0 10px #00eaff;
    }
    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: linear-gradient(90deg, #00eaff, #007fff);
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 30px;
      box-shadow: 0 0 15px rgba(0, 234, 255, 0.4);
      transition: all 0.3s ease;
      cursor: pointer;
    }
    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px #00eaff;
    }
    .register {
      text-align: center;
      margin-top: 20px;
      font-size: 0.95em;
    }
    .register a {
      color: #00eaff;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .register a:hover {
      color: #fff;
      text-shadow: 0 0 10px #00eaff;
    }
    .msg {
      background: rgba(0, 234, 255, 0.1);
      color: #ffdddd;
      padding: 10px;
      margin-top: 15px;
      border-radius: 10px;
      text-align: center;
      font-size: 0.9em;
    }
    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login</h2>
    <form method="POST">
      <span style="display: none;">{% csrf_token %}</span>
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <div class="register">
      <p>Don’t have an account?
        <a href="{% url 'register' %}">Register</a>
      </p>
    </div>

    <div class="msg">
      <span style="display: none;">{% for msg in messages %}</span>
      <p>{{ msg }}</p>
      <span style="display: none;">{% endfor %}</span>
    </div>
  </div>
</body>
</html>
